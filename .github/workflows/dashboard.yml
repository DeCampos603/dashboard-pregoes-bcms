name: Atualizar Dashboard Pregões

# Roda todo dia (cron em UTC; 11:30 UTC = 08:30 de Brasília) e sob demanda.
# O agendamento do GitHub é "melhor esforço" (pode atrasar alguns minutos).
on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar o dashboard (baixa o consolidado do Drive)
        env:
          # Secret com o ID do Consolidado_Pregoes.xlsx no Google Drive.
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
        run: python gerar_dashboard.py

      - name: Salvar histórico (commit se mudou)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --staged --quiet; then
            echo "Sem mudança no histórico."
          else
            git commit -m "Atualiza histórico diário [skip ci]"
            git push
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar no GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
